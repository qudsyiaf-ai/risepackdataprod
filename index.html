<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Daily Production Report – Risepack</title>
<style>
:root{
  --bg:#F2F0EC;--surface:#FFFFFF;--surface2:#F8F6F2;--border:#E5E1D8;--border2:#C8C2B4;
  --text:#1C1810;--text2:#6B5F4A;--text3:#A89880;
  --orange:#E8830A;--orange-d:#C4700A;--orange-bg:#FFF4E0;--orange-t:#7A4000;
  --brown:#2D1F0E;
  --green:#1A6B45;--green-bg:#E6F4EE;--green-t:#0D4228;
  --red:#B83220;--red-bg:#FDECEA;--red-t:#7A2015;
  --amber:#A85208;--amber-bg:#FFF8E6;--amber-t:#6B3405;
  --r:12px;--rsm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{max-width:430px;margin:0 auto;min-height:100vh}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* TOPBAR */
.topbar{background:var(--brown);padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.topbar-back{width:32px;height:32px;border:none;background:rgba(255,255,255,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:var(--rsm);color:#fff;font-size:17px;flex-shrink:0}
.topbar-info{flex:1;min-width:0}
.topbar-title{font-size:14px;font-weight:700;color:#fff;line-height:1.2}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
.topbar-logo{height:26px;object-fit:contain}

/* LOGIN */
.login-wrap{flex:1;display:flex;flex-direction:column;min-height:100vh;background:var(--brown)}
.login-hero{padding:36px 24px 0;display:flex;flex-direction:column;align-items:center}
.login-logo-card{background:#fff;border-radius:16px;padding:14px 28px;margin-bottom:22px;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.login-logo{height:36px;object-fit:contain;display:block}
.login-hero-title{font-size:24px;font-weight:800;color:#fff;text-align:center;line-height:1.15;letter-spacing:-.4px}
.login-hero-title span{color:var(--orange)}
.login-hero-sub{font-size:13px;color:rgba(255,255,255,.55);text-align:center;margin-top:8px;line-height:1.5}
.login-body{background:var(--surface);border-radius:20px 20px 0 0;flex:1;padding:28px 20px 36px;margin-top:28px;box-shadow:0 -6px 28px rgba(0,0,0,.18)}

/* TABS, FIELDS, BUTTONS, DLL */
.mode-tabs{display:flex;background:var(--surface2);border-radius:var(--rsm);padding:3px;gap:3px;margin-bottom:20px}
.mode-tab{flex:1;height:36px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:none;color:var(--text3);transition:all .15s}
.mode-tab.active{background:var(--surface);color:var(--brown);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;height:44px;border:1.5px solid var(--border2);border-radius:var(--rsm);padding:0 13px;font-size:14px;color:var(--text);background:var(--surface);appearance:none}
.btn{width:100%;height:46px;border-radius:var(--rsm);font-size:14px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-primary{background:linear-gradient(135deg,#E8830A,#C4700A);color:#fff}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:11px}
.alert{padding:10px 12px;border-radius:var(--rsm);font-size:13px;margin-bottom:11px}
.ae{background:var(--red-bg);color:var(--red-t)}
</style>
</head>
<body>

<div class="app">
  <div id="sc-login" class="screen active">
    <div class="login-wrap">
      <div class="login-hero">
        <div class="login-logo-card"><img class="login-logo" src="./logo_rspk.jpeg" alt="Risepack"/></div>
        <div class="login-hero-title">Daily <span>Production</span><br>Report</div>
        <div class="login-hero-sub">Laporan Individu Pekerja Harian</div>
      </div>
      <div class="login-body">
        <div class="mode-tabs">
          <button class="mode-tab active" id="tab-single" onclick="setMode('single')">1 Pekerja</button>
          <button class="mode-tab" id="tab-multi" onclick="setMode('multi')">Tim / Line</button>
        </div>
        <div id="panel-single">
          <div class="field"><label>ID Operator</label>
            <select id="login-id"><option value="">&#8212; Pilih ID Operator &#8212;</option></select>
          </div>
          <button class="btn btn-primary" onclick="doLogin()">Masuk</button>
        </div>
        <div style="text-align:center;margin-top:14px">
          <button class="btn-ghost btn" style="background:none;color:var(--text3);font-size:12px" onclick="showScreen('sc-setup')">&#9881; Setup Aplikasi</button>
        </div>
      </div>
    </div>
  </div>

  <div id="sc-setup" class="screen">
    <div class="topbar">
      <button class="topbar-back" onclick="showScreen('sc-login')"> Kembali </button>
      <div class="topbar-info"><div class="topbar-title">Setup Aplikasi</div></div>
    </div>
    <div class="body" style="padding:20px">
      <div class="field">
        <label>Web App URL (Google Script)</label>
        <input type="text" id="set-gsurl" placeholder="https://script.google.com/..."/>
      </div>
      <button class="btn btn-primary" onclick="saveSetup()">Simpan & Hubungkan</button>
      <div id="setup-msg" style="margin-top:10px"></div>
    </div>
  </div>
</div>

<script>
// --- KONFIGURASI UTAMA ---
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) } catch(e) { return null } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

// URL DEPLOYMENT BARU KAMU LANGSUNG DI SINI
const MY_DEPLOY_URL = "https://script.google.com/macros/s/AKfycbwhGN4rTF9-v466Y9_IohV3H_aTnqEHR_LWc_GtOnPlGvBswdo8sltSGUl7dqyP7cx_/exec";

let DB = {
  gsUrl: LS.get('gs_url') || MY_DEPLOY_URL,
  operators: LS.get('gs_operators') || []
};

// --- FUNGSI CORE ---
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function initApp() {
  const select = document.getElementById('login-id');
  if (!DB.gsUrl) {
    console.error("URL Script Kosong");
    return;
  }
  
  try {
    const res = await fetch(DB.gsUrl + "?action=getDB");
    const data = await res.json();
    if (data.status === 'ok') {
      DB.operators = data.karyawan;
      LS.set('gs_operators', data.karyawan);
      renderOperators();
    }
  } catch (e) {
    console.error("Gagal ambil data:", e);
  }
}

function renderOperators() {
  const select = document.getElementById('login-id');
  select.innerHTML = '<option value="">&#8212; Pilih ID Operator &#8212;</option>';
  DB.operators.forEach(op => {
    const opt = document.createElement('option');
    opt.value = op.id;
    opt.textContent = op.id + " — " + op.name;
    select.appendChild(opt);
  });
}

function saveSetup() {
  const url = document.getElementById('set-gsurl').value;
  if (url) {
    DB.gsUrl = url;
    LS.set('gs_url', url);
    initApp();
    alert("Setup Berhasil disimpan!");
    showScreen('sc-login');
  }
}

function setMode(m) {
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  if (m === 'single') document.getElementById('tab-single').classList.add('active');
  else document.getElementById('tab-multi').classList.add('active');
}

// Jalankan otomatis saat web dibuka
window.onload = () => {
  document.getElementById('set-gsurl').value = DB.gsUrl;
  initApp();
};
</script>
</body>
</html>
